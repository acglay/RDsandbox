<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>RD Sandbox v2.4 Master</title>
    <style>
        :root { --bg: #000; --ui: #121212; --acc: #00d4ff; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #canvas-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        canvas { 
            width: 95vmin; height: 95vmin; 
            touch-action: none; image-rendering: auto; 
            background: transparent; border: 1px solid #222; 
        }
        
        #hud { position: absolute; right: calc(50% - 47.5vmin + 10px); top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .hud-btn { 
            width: 44px; height: 44px; border-radius: 10px; border: 1px solid #444; 
            background: rgba(25, 25, 25, 0.9); color: #fff; font-size: 20px; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: 0.2s;
        }
        .hud-btn.active { background: var(--acc); color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(0,212,255,0.6); }

        #hint { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 8px 16px; border-radius: 20px; font-size: 11px; opacity: 0; transition: 0.3s; pointer-events: none; border: 1px solid var(--acc); z-index: 200; white-space: nowrap; }

        #ui { background: var(--ui); padding: 15px 15px 50px 15px; border-top: 1px solid #333; z-index: 150; box-sizing: border-box; overflow-y: auto; }
        .sliders { display: flex; flex-direction: column; gap: 6px; }
        .row { display: flex; align-items: center; gap: 8px; font-size: 10px; }
        .row label { width: 60px; color: #777; font-weight: bold; }
        input[type="range"] { flex: 1; accent-color: var(--acc); height: 20px; cursor: pointer; }
        input[type="color"] { width: 35px; height: 22px; border: none; background: transparent; padding: 0; cursor: pointer; }
        .val { color: var(--acc); min-width: 40px; text-align: right; font-family: monospace; font-size: 11px; }
        .res-btn { background: #222; border: none; color: #555; font-size: 12px; padding: 0 5px; cursor: pointer; border-radius: 4px; }

        .v { position: absolute; top: 5px; left: 10px; font-size: 10px; color: #333; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="canvas-wrap">
        <div class="v">ver 2.4 Master</div><div id="hint"></div>
        <canvas id="cvs"></canvas>
        <div id="hud">
            <button class="hud-btn" id="p-btn" onclick="tglR()">▶️</button>
            <button class="hud-btn" id="s-btn" onclick="cycS()">⬜</button>
            <button class="hud-btn" id="rd-btn" onclick="cycRD()">🦠</button>
            <button class="hud-btn" onclick="cycC()">🌈</button>
            <button class="hud-btn active" onclick="tglG()" id="g-btn">✨</button>
            <button class="hud-btn active" onclick="tglT()" id="t-btn">🫥</button>
            <button class="hud-btn" onclick="clr()">🔄</button>
            <button class="hud-btn" onclick="sv()">📸</button>
        </div>
    </div>

    <div id="ui">
        <div class="sliders">
            <div class="row"><label>Speed</label><input type="range" id="sp" min="1" max="100" value="25"><span class="val" id="v-sp"></span><button class="res-btn" onclick="rstP('sp',25)">↺</button></div>
            <div class="row"><label>Scale</label><input type="range" id="sc" min="0.1" max="1.0" step="0.05" value="0.50"><span class="val" id="v-sc"></span><button class="res-btn" onclick="rstP('sc',0.50)">↺</button></div>
            <div class="row"><label>Offset</label><input type="range" id="off" min="-2.0" max="2.0" step="0.01" value="0.0"><span class="val" id="v-off"></span><button class="res-btn" onclick="rstP('off',0.0)">↺</button></div>
            <div class="row"><label>Gamma</label><input type="range" id="gam" min="0.1" max="3.0" step="0.05" value="0.5"><span class="val" id="v-gam"></span><button class="res-btn" onclick="rstP('gam',0.5)">↺</button></div>
            <div class="row"><label>Feed</label><input type="range" id="f" min="0.01" max="0.1" step="0.001" value="0.037"><span class="val" id="v-f"></span><button class="res-btn" onclick="rstP('f',0.037)">↺</button></div>
            <div class="row"><label>Kill</label><input type="range" id="k" min="0.01" max="0.1" step="0.001" value="0.060"><span class="val" id="v-k"></span><button class="res-btn" onclick="rstP('k',0.060)">↺</button></div>
            <div class="row">
                <label>Color</label>
                <input type="color" id="pc" value="#ffffff">
                <input type="color" id="bc" value="#002200">
                <span style="color:#444; margin-left:10px">Pat / Bg</span>
            </div>
        </div>
    </div>

<script>
const W=200,H=200,cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d',{alpha:true});
cvs.width=W; cvs.height=H;

let gA=new Float32Array(W*H).fill(1), gB=new Float32Array(W*H).fill(0), nA=new Float32Array(W*H), nB=new Float32Array(W*H), mask=new Float32Array(W*H).fill(1);
let run=false, cI=4, sI=0, rdI=0, isT=true; 

const shapes = ['square', 'metaball'];
const sIcons = ['⬜', '🎲'];
const rdPresets = [
    {f:0.037, k:0.060, e:"🦠", n:"Mitosis"}, {f:0.054, k:0.062, e:"🪸", n:"Coral"},
    {f:0.035, k:0.060, e:"🧫", n:"Bacteria"}, {f:0.018, k:0.051, e:"🌀", n:"Spirals"}, 
    {f:0.054, k:0.061, e:"🖐️", n:"Fingerprint"}, {f:0.062, k:0.061, e:"🌊", n:"U-Skate"}, {f:0.025, k:0.050, e:"🫧", n:"Bubbles"}
];
const cP=[
    {p:"#00ffff",b:"#1a1a2e",n:"Cool"},{p:"#ff00ff",b:"#220022",n:"Neon"},
    {p:"#d4af37",b:"#111111",n:"Chic"},{p:"#ccff00",b:"#330066",n:"Psyche"},
    {p:"#ffffff",b:"#002200",n:"Forest"},{p:"#ff4400",b:"#110500",n:"Magma"}
];

const p={f:0.037, k:0.060, sp:25, glow:true, sc:0.5, off:0.0, gam:0.5, pRGB:[255,255,255], bRGB:[0,34,0]};

const hnt=(t)=>{const h=document.getElementById('hint');h.innerText=t;h.style.opacity=1;setTimeout(()=>h.style.opacity=0,1200)};
const getI=(x,y)=>((x+W)%W)+((y+H)%H)*W;
const hex=(h)=>h.match(/[A-Za-z0-9]{2}/g).map(v=>parseInt(v,16));

function tglR(){run=!run;document.getElementById('p-btn').innerText=run?"⏸️":"▶️";hnt(run?"Running":"Paused")}
function clr(){gA.fill(1);gB.fill(0);drw();hnt("Cleared")}
function tglT(){isT=!isT;document.getElementById('t-btn').classList.toggle('active',isT);hnt(isT?"Transparent ON":"Transparent OFF")}

function cycS(){
    sI = (sI + 1) % shapes.length;
    document.getElementById('s-btn').innerText = sIcons[sI];
    mU(); hnt("Seed: " + shapes[sI]);
}

function cycRD(){
    rdI = (rdI + 1) % rdPresets.length;
    const pr = rdPresets[rdI];
    document.getElementById('f').value = pr.f;
    document.getElementById('k').value = pr.k;
    document.getElementById('rd-btn').innerText = pr.e;
    hnt(pr.n);
}

function cycC(){
    cI = (cI + 1) % cP.length;
    document.getElementById('pc').value = cP[cI].p;
    document.getElementById('bc').value = cP[cI].b;
    hnt(cP[cI].n);
}

function tglG(){p.glow=!p.glow; document.getElementById('g-btn').classList.toggle('active', p.glow); hnt("Glow: "+(p.glow?"ON":"OFF"))}
function rstP(id, val){ document.getElementById(id).value = val; hnt("Reset"); }

function sv(){
    hnt("📸 Saving High-Quality PNG...");
    const link=document.createElement('a');
    link.download=`RD_v2.4_${Date.now()}.png`;
    link.href=cvs.toDataURL('image/png');
    link.click();
}

// Topology-Aware Shell Generation
function mU(){
    const mc=document.createElement('canvas'); mc.width=W; mc.height=H;
    const mctx=mc.getContext('2d');
    mctx.fillStyle="#000"; mctx.fillRect(0,0,W,H);
    
    const curS = shapes[sI];
    const thickness = 4; // Target thickness
    
    const drawBase = (ctx, offset=0) => {
        ctx.fillStyle="#fff";
        if(curS==='square'){
            ctx.fillRect(30+offset, 30+offset, W-60-offset*2, H-60-offset*2);
        } else {
            // Re-seedable metaballs for fixed shape
            Math.seedrandom ? Math.seedrandom('seed') : null;
            const balls = [
                {x:80, y:80, r:30}, {x:120, y:120, r:35}, 
                {x:70, y:130, r:25}, {x:140, y:70, r:20}
            ];
            tctx_blob(ctx, balls, offset);
        }
    };

    function tctx_blob(ctx, bs, offset){
        bs.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, Math.max(0, b.r - offset), 0, Math.PI*2);
            ctx.fill();
        });
    }

    // High Precision Shell Extraction
    const t1 = document.createElement('canvas'); t1.width=W; t1.height=H;
    const ctx1 = t1.getContext('2d');
    
    // 1. Draw Outer Shape
    ctx1.filter = "blur(1px)"; // Minor AA
    drawBase(ctx1, 0);
    
    // 2. Punch out Inner Shape
    ctx1.globalCompositeOperation = "destination-out";
    drawBase(ctx1, thickness);
    
    // 3. Final smooth Blur for Mask
    mctx.filter = "blur(0.8px)";
    mctx.drawImage(t1, 0, 0);
    
    const d=mctx.getImageData(0,0,W,H).data;
    for(let i=0; i<W*H; i++) mask[i]=d[i*4]/255;
    gA.fill(1); gB.fill(0);
    drw();
}

const ipt=(e)=>{
    const r=cvs.getBoundingClientRect();
    const cx=(e.clientX || (e.touches && e.touches[0].clientX));
    const cy=(e.clientY || (e.touches && e.touches[0].clientY));
    if(cx === undefined) return;
    const mx=Math.floor((cx-r.left)/r.width*W), my=Math.floor((cy-r.top)/r.height*H);
    const brushR = 6;
    for(let y=-brushR;y<=brushR;y++)for(let x=-brushR;x<=brushR;x++){
        const dsq = x*x+y*y;
        if(dsq < brushR*brushR){
            const i=getI(mx+x,my+y);
            const soft = (1.0 - Math.sqrt(dsq)/brushR);
            if(mask[i]>0.1) gB[i] = Math.max(gB[i], 0.85 * soft);
        }
    }
    if(!run) drw();
};
cvs.addEventListener('pointerdown',ipt);
cvs.addEventListener('pointermove',e=>{if(e.buttons>0||e.pointerType==='touch')ipt(e)});

function stp(){
    const f=p.f,k=p.k,da=p.sc,db=p.sc*0.5;
    for(let i=0; i<W*H; i++){
        const m = mask[i]; if(m<0.01){nA[i]=1;nB[i]=0;continue}
        const x=i%W,y=(i/W)|0,a=gA[i],b=gB[i],abb=a*b*b;
        const lA=gA[getI(x-1,y)]*0.2+gA[getI(x+1,y)]*0.2+gA[getI(x,y-1)]*0.2+gA[getI(x,y+1)]*0.2+gA[getI(x-1,y-1)]*0.05+gA[getI(x+1,y-1)]*0.05+gA[getI(x-1,y+1)]*0.05+gA[getI(x+1,y+1)]*0.05-a;
        const lB=gB[getI(x-1,y)]*0.2+gB[getI(x+1,y)]*0.2+gB[getI(x,y-1)]*0.2+gB[getI(x,y+1)]*0.2+gB[getI(x-1,y-1)]*0.05+gB[getI(x+1,y-1)]*0.05+gB[getI(x-1,y+1)]*0.05+gB[getI(x+1,y+1)]*0.05-b;
        nA[i]=Math.max(0,Math.min(1,a+(da*lA-abb+f*(1-a))*m));
        nB[i]=Math.max(0,Math.min(1,b+(db*lB+abb-(k+f)*b)*m));
    }
    gA.set(nA);gB.set(nB);
}

function drw(){
    const d=ctx.createImageData(W,H),pR=p.pRGB[0],pG=p.pRGB[1],pB=p.pRGB[2],bR=p.bRGB[0],bG=p.bRGB[1],bB=p.bRGB[2];
    const offset = p.off, gamma = p.gam;
    for(let i=0;i<W*H;i++){
        const px=i*4,m=mask[i];
        
        // --- Reaction Pattern Post-Process ---
        let v = (1 - (gA[i] - gB[i])) + offset;
        v = Math.max(0, Math.min(1, v));
        // Density Correction via Gamma
        if(v > 0) v = Math.pow(v, gamma);
        
        const bV=gB[i], gl=p.glow?bV*2.0:0;
        let r=pR*v+bR*(1-v)+gl*100,g=pG*v+bG*(1-v)+gl*100,b=pB*v+bB*(1-v)+gl*100;
        
        const alpha = isT ? Math.min(255, (v*255 + bV*255) * m) : 255;
        const edge = (m > 0 && m < 0.98) ? 12 : 0;
        
        d.data[px]=(r+edge)*m + (isT ? 0 : bR*(1-m)) + edge; 
        d.data[px+1]=(g+edge)*m + (isT ? 0 : bG*(1-m)) + edge; 
        d.data[px+2]=(b+edge)*m + (isT ? 0 : bB*(1-m)) + edge; 
        d.data[px+3]=alpha;
    }
    ctx.putImageData(d,0,0);
}

function lp(){
    p.f=parseFloat(document.getElementById('f').value); p.k=parseFloat(document.getElementById('k').value);
    p.sc=parseFloat(document.getElementById('sc').value); p.sp=parseInt(document.getElementById('sp').value);
    p.off=parseFloat(document.getElementById('off').value); p.gam=parseFloat(document.getElementById('gam').value);
    p.pRGB=hex(document.getElementById('pc').value); p.bRGB=hex(document.getElementById('bc').value);
    
    document.getElementById('v-f').innerText=p.f.toFixed(3); document.getElementById('v-k').innerText=p.k.toFixed(3);
    document.getElementById('v-sc').innerText=p.sc.toFixed(2); document.getElementById('v-sp').innerText=p.sp;
    document.getElementById('v-off').innerText=(p.off > 0 ? "+" : "") + p.off.toFixed(2);
    document.getElementById('v-gam').innerText=p.gam.toFixed(2);
    
    if(run){for(let i=0;i<p.sp;i++)stp();drw();} else { drw(); }
    requestAnimationFrame(lp);
}

mU(); lp();
</script>
</body>
</html>
