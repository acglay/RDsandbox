<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>RD Sandbox - Color & Smooth</title>
    <style>
        body { margin: 0; background: #111; color: #eee; font-family: sans-serif; overflow: hidden; display: flex; font-size: 11px; }
        #ui { padding: 15px; width: 260px; height: 100vh; background: #222; box-sizing: border-box; overflow-y: auto; z-index: 10; }
        .ctrl { margin-bottom: 12px; }
        .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        label { font-weight: bold; }
        .reset-btn { background: #444; color: #fff; border: none; padding: 0 5px; cursor: pointer; border-radius: 3px; font-size: 10px; }
        input, select { width: 100%; background: #333; color: #fff; border: 1px solid #555; height: 24px; box-sizing: border-box; }
        input[type="color"] { padding: 0; border: none; cursor: pointer; height: 30px; }
        .main-btn { width: 100%; padding: 8px; margin-top: 5px; cursor: pointer; background: #444; color: #fff; border: none; font-weight: bold; }
        canvas { background: #000; cursor: crosshair; image-rendering: auto; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ctrl"><label>Preset (Parameters)</label>
            <select id="preset"><option value="manual">Manual</option><option value="mitosis">Mitosis</option><option value="coral">Coral</option><option value="spirals">Spirals</option></select>
        </div>
        <div class="ctrl"><label>Shape</label>
            <select id="shape"><option value="circle">Circle</option><option value="square">Square</option><option value="horse">Horse</option><option value="metaball">Metaballs</option></select>
            <button id="meta-rand" class="main-btn" style="display:none">Randomize Metaballs</button>
        </div>
        <hr style="border:0; border-top:1px solid #444">
        <div class="ctrl"><label>Color Mode</label>
            <select id="c-mode"><option value="manual">Manual (Color Wheel)</option><option value="preset">Color Presets</option></select>
        </div>
        <div id="c-preset-wrap" class="ctrl" style="display:none"><label>Color Presets</label>
            <select id="c-preset">
                <option value="psy1">Psychedelic 1 (Pink/Neon)</option><option value="psy2">Psychedelic 2 (Purple/Yellow)</option>
                <option value="cool1">Cool 1 (Deep Blue/Cyan)</option><option value="cool2">Cool 2 (Midnight/Ice)</option>
                <option value="chic1">Chic 1 (Charcoal/Gold)</option><option value="chic2">Chic 2 (Forest/Cream)</option>
            </select>
        </div>
        <div id="c-manual-wrap">
            <div class="ctrl"><label>Pattern Color</label><input type="color" id="p-col" value="#00ffff"></div>
            <div class="ctrl"><label>Background Color</label><input type="color" id="bg-col" value="#1a1a2e"></div>
        </div>
        <hr style="border:0; border-top:1px solid #444">
        <div class="ctrl"><div class="head"><label>Scale: <span id="sv_scale"></span></label><button class="reset-btn" onclick="resetParam('scale', 1.0)">↺</button></div><input type="range" id="scale" min="0.1" max="1.5" step="0.1" value="1.0"></div>
        <div class="ctrl"><div class="head"><label>Feed (f): <span id="fv"></span></label><button class="reset-btn" onclick="resetParam('f', 0.037)">↺</button></div><input type="range" id="f" min="0.01" max="0.1" step="0.001" value="0.037"></div>
        <div class="ctrl"><div class="head"><label>Kill (k): <span id="kv"></span></label><button class="reset-btn" onclick="resetParam('k', 0.060)">↺</button></div><input type="range" id="k" min="0.01" max="0.1" step="0.001" value="0.060"></div>
        <div class="ctrl"><div class="head"><label>Sim Speed: <span id="sv"></span></label><button class="reset-btn" onclick="resetParam('speed', 8)">↺</button></div><input type="range" id="speed" min="1" max="25" step="1" value="8"></div>
        <div class="ctrl"><label><input type="checkbox" id="glow" style="width:auto" checked> Glow Effect</label></div>
        <button class="main-btn" id="reset">Clear Simulation</button>
        <button class="main-btn" id="start" style="background:#557">Start</button>
    </div>
    <canvas id="cvs"></canvas>

<script>
const W = 200, H = 200, canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d', {alpha: false});
canvas.width = W; canvas.height = H; canvas.style.width = 'min(90vh, 90vw)'; canvas.style.height = 'min(90vh, 90vw)';
let gridA = new Float32Array(W*H).fill(1), gridB = new Float32Array(W*H).fill(0), nextA = new Float32Array(W*H), nextB = new Float32Array(W*H), mask = new Float32Array(W*H).fill(1), running = false;
const p = { f: 0.037, k: 0.060, speed: 8, glow: true, da: 1.0, db: 0.5, pRGB: [0,255,255], bRGB: [26,26,46] };
const presets = { mitosis: { f: 0.036, k: 0.064 }, coral: { f: 0.054, k: 0.062 }, spirals: { f: 0.018, k: 0.051 } };
const colorPresets = {
    psy1: { p: "#ff00ff", b: "#ccff00" }, psy2: { p: "#9d00ff", b: "#ffff00" },
    cool1: { p: "#00ffff", b: "#000033" }, cool2: { p: "#80d0ff", b: "#101020" },
    chic1: { p: "#d4af37", b: "#222222" }, chic2: { p: "#f5f5dc", b: "#1a3a34" }
};
const getIdx = (x, y) => ((x + W) % W) + ((y + H) % H) * W;
const hexToRgb = hex => hex.match(/[A-Za-z0-9]{2}/g).map(v => parseInt(v, 16));

function resetParam(id, val) { document.getElementById(id).value = val; if(id==='f'||id==='k') document.getElementById('preset').value='manual'; syncUI(); }

function updateMask() {
    const mCtx = Object.assign(document.createElement('canvas'), {width: W, height: H}).getContext('2d');
    mCtx.fillStyle="black"; mCtx.fillRect(0,0,W,H); mCtx.fillStyle="white";
    const type = document.getElementById('shape').value;
    document.getElementById('meta-rand').style.display = (type === 'metaball') ? 'block' : 'none';
    mCtx.filter = "blur(1.5px)"; // Anti-alias & Fade effect
    if (type === 'circle') { mCtx.beginPath(); mCtx.arc(W/2, H/2, W/2.4, 0, Math.PI*2); mCtx.fill(); }
    else if (type === 'square') mCtx.fillRect(25, 25, W-50, H-50);
    else if (type === 'horse') { mCtx.font = `${W*0.75}px serif`; mCtx.textAlign="center"; mCtx.textBaseline="middle"; mCtx.fillText('🐎', W/2, H/2+10); }
    else if (type === 'metaball') {
        const balls = Array.from({length: 5}, () => ({x: 30+Math.random()*(W-60), y: 30+Math.random()*(H-60), r: 20+Math.random()*25}));
        for(let y=0; y<H; y++) for(let x=0; x<W; x++) {
            let v = 0; balls.forEach(b => v += (b.r*b.r) / (Math.pow(x-b.x, 2) + Math.pow(y-b.y, 2)));
            if (v > 1.0) mCtx.fillRect(x, y, 1, 1);
        }
    }
    const d = mCtx.getImageData(0,0,W,H).data;
    for(let i=0; i<W*H; i++) mask[i] = d[i*4] / 255.0;
    gridA.fill(1); gridB.fill(0); draw();
}

canvas.onmousedown = (e) => {
    const r = canvas.getBoundingClientRect(), mx = Math.floor((e.clientX - r.left) / r.width * W), my = Math.floor((e.clientY - r.top) / r.height * H);
    for(let y=-5; y<=5; y++) for(let x=-5; x<=5; x++) {
        const d = Math.sqrt(x*x + y*y), idx = getIdx(mx+x, my+y);
        if(d < 5 && mask[idx] > 0.1) gridB[idx] += (1 - d/5) * 0.8;
    }
    if(!running) draw();
};

function step() {
    const f = p.f, k = p.k, da = p.da, db = p.db;
    for(let i=0; i<W*H; i++) {
        const m = mask[i];
        if(m < 0.01) { nextA[i]=1; nextB[i]=0; continue; }
        const x = i % W, y = (i / W) | 0, a = gridA[i], b = gridB[i], abb = a * b * b;
        const lapA = gridA[getIdx(x-1,y)]*0.2 + gridA[getIdx(x+1,y)]*0.2 + gridA[getIdx(x,y-1)]*0.2 + gridA[getIdx(x,y+1)]*0.2 + gridA[getIdx(x-1,y-1)]*0.05 + gridA[getIdx(x+1,y-1)]*0.05 + gridA[getIdx(x-1,y+1)]*0.05 + gridA[getIdx(x+1,y+1)]*0.05 - a;
        const lapB = gridB[getIdx(x-1,y)]*0.2 + gridB[getIdx(x+1,y)]*0.2 + gridB[getIdx(x,y-1)]*0.2 + gridB[getIdx(x,y+1)]*0.2 + gridB[getIdx(x-1,y-1)]*0.05 + gridB[getIdx(x+1,y-1)]*0.05 + gridB[getIdx(x-1,y+1)]*0.05 + gridB[getIdx(x+1,y+1)]*0.05 - b;
        // Apply mask to reaction speed for smoother edges
        nextA[i] = Math.max(0, Math.min(1, a + (da * lapA - abb + f * (1 - a)) * m));
        nextB[i] = Math.max(0, Math.min(1, b + (db * lapB + abb - (k + f) * b) * m));
    }
    gridA.set(nextA); gridB.set(nextB);
}

function draw() {
    const img = ctx.createImageData(W, H);
    const pR = p.pRGB[0], pG = p.pRGB[1], pB = p.pRGB[2];
    const bR = p.bRGB[0], bG = p.bRGB[1], bB = p.bRGB[2];
    for(let i=0; i<W*H; i++) {
        const px = i * 4, m = mask[i];
        const val = Math.max(0, 1 - (gridA[i] - gridB[i])), bVal = gridB[i];
        let glow = p.glow ? bVal * 1.5 : 0;
        
        // Linear Interpolation: (Pattern * val) + (Background * (1-val))
        let r = pR * val + bR * (1 - val) + glow * 100;
        let g = pG * val + bG * (1 - val) + glow * 100;
        let b = pB * val + bB * (1 - val) + glow * 100;

        // Final Mask Blend (for boundary smoothing)
        img.data[px] = r * m + bR * (1 - m);
        img.data[px+1] = g * m + bG * (1 - m);
        img.data[px+2] = b * m + bB * (1 - m);
        img.data[px+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
}

function syncUI() {
    const pSel = document.getElementById('preset').value, cSel = document.getElementById('c-mode').value;
    if(pSel !== 'manual') { document.getElementById('f').value = p.f = presets[pSel].f; document.getElementById('k').value = p.k = presets[pSel].k; }
    else { p.f = parseFloat(document.getElementById('f').value); p.k = parseFloat(document.getElementById('k').value); }
    document.getElementById('f').disabled = document.getElementById('k').disabled = (pSel !== 'manual');

    const isCPre = (cSel === 'preset');
    document.getElementById('c-preset-wrap').style.display = isCPre ? 'block' : 'none';
    document.getElementById('c-manual-wrap').style.display = isCPre ? 'none' : 'block';
    
    let pCol, bCol;
    if(isCPre) {
        const cp = colorPresets[document.getElementById('c-preset').value];
        pCol = cp.p; bCol = cp.b;
    } else {
        pCol = document.getElementById('p-col').value; bCol = document.getElementById('bg-col').value;
    }
    p.pRGB = hexToRgb(pCol); p.bRGB = hexToRgb(bCol);
    const sc = parseFloat(document.getElementById('scale').value);
    p.da = sc; p.db = 0.5 * sc; p.speed = parseInt(document.getElementById('speed').value); p.glow = document.getElementById('glow').checked;
    ['fv','kv','sv','sv_scale'].forEach(id => document.getElementById(id).innerText = (id==='sv'?p.speed:p[id[0]].toFixed(3)));
}

function loop() { if(running) { syncUI(); for(let i=0; i<p.speed; i++) step(); draw(); } else { syncUI(); draw(); } requestAnimationFrame(loop); }
document.getElementById('reset').onclick = () => { gridA.fill(1); gridB.fill(0); draw(); };
document.getElementById('start').onclick = () => { running = !running; document.getElementById('start').innerText = running ? "Pause" : "Start"; };
document.getElementById('shape').onchange = updateMask;
document.getElementById('meta-rand').onclick = updateMask;
updateMask(); loop();
</script>
</body>
</html>
