<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>RD Sandbox v1.9</title>
    <style>
        :root { --bg: #000; --ui: #121212; --acc: #00d4ff; --glow-bg: #004455; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #canvas-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { 
            width: 95vmin; height: 95vmin; 
            touch-action: none; image-rendering: auto; 
            background: #020202; border: 1px solid #1a1a1a; 
        }
        
        /* Floating HUD - Right Centered */
        #hud { position: absolute; right: calc(50% - 47.5vmin + 8px); top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .hud-btn { 
            width: 44px; height: 44px; border-radius: 10px; border: 1px solid #333; 
            background: rgba(20, 20, 20, 0.85); color: #fff; font-size: 20px; 
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); transition: 0.2s;
        }
        .hud-btn.active { background: var(--glow-bg); color: var(--acc); border-color: var(--acc); box-shadow: 0 0 10px var(--glow-bg); }

        #hint { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 8px 18px; border-radius: 20px; font-size: 11px; opacity: 0; transition: 0.3s; pointer-events: none; border: 1px solid var(--acc); z-index: 200; white-space: nowrap;}

        /* Bottom UI Panel */
        #ui { background: var(--ui); padding: 15px 20px 25px 20px; border-top: 1px solid #222; z-index: 150; box-sizing: border-box; }
        .sliders { display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; align-items: center; gap: 12px; font-size: 11px; }
        .row label { width: 45px; color: #777; font-weight: bold; }
        input[type="range"] { flex: 1; accent-color: var(--acc); height: 20px; cursor: pointer; }
        .val { color: var(--acc); min-width: 40px; text-align: right; font-family: 'Courier New', monospace; font-size: 12px; }
        .res-btn { background: #222; border: none; color: #555; font-size: 14px; padding: 0 8px; cursor: pointer; border-radius: 4px; }
        .res-btn:active { color: #fff; }

        .v { position: absolute; top: 5px; left: 8px; font-size: 9px; color: #222; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="canvas-wrap">
        <div class="v">v1.9-master</div><div id="hint"></div>
        <canvas id="cvs"></canvas>
        <div id="hud">
            <button class="hud-btn" id="p-btn" onclick="tglR()">▶️</button>
            <button class="hud-btn" id="s-btn" onclick="cycS()">⭕</button>
            <button class="hud-btn" onclick="cycRD()">🧬</button>
            <button class="hud-btn" onclick="cycC()">🌈</button>
            <button class="hud-btn" onclick="tglG()" id="g-btn">✨</button>
            <button class="hud-btn" onclick="clr()">🔄</button>
            <button class="hud-btn" onclick="sv()">📸</button>
        </div>
    </div>

    <div id="ui">
        <div class="sliders">
            <div class="row"><label>Speed</label><input type="range" id="sp" min="1" max="100" value="25"><span class="val" id="v-sp"></span><button class="res-btn" onclick="rstP('sp',25)">↺</button></div>
            <div class="row"><label>Scale</label><input type="range" id="sc" min="0.1" max="1.0" step="0.05" value="0.5"><span class="val" id="v-sc"></span><button class="res-btn" onclick="rstP('sc',0.5)">↺</button></div>
            <div class="row"><label>Feed</label><input type="range" id="f" min="0.01" max="0.1" step="0.001" value="0.037"><span class="val" id="v-f"></span><button class="res-btn" onclick="rstP('f',0.037)">↺</button></div>
            <div class="row"><label>Kill</label><input type="range" id="k" min="0.01" max="0.1" step="0.001" value="0.060"><span class="val" id="v-k"></span><button class="res-btn" onclick="rstP('k',0.060)">↺</button></div>
        </div>
        <input type="color" id="pc" value="#00ffff" style="display:none">
        <input type="color" id="bc" value="#1a1a2e" style="display:none">
    </div>

<script>
const W=200,H=200,cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d',{alpha:false});
cvs.width=W; cvs.height=H;

let gA=new Float32Array(W*H).fill(1), gB=new Float32Array(W*H).fill(0), nA=new Float32Array(W*H), nB=new Float32Array(W*H), mask=new Float32Array(W*H).fill(1);
let run=false, cI=0, sI=0, rdI=0;

const shapes = ['circle', 'square', 'metaball'];
const sIcons = ['⭕', '⬜', '🎲'];
const p={f:0.037, k:0.060, sp:25, glow:true, sc:0.5, pRGB:[0,255,255], bRGB:[26,26,46]};

const rdPresets = [
    {f:0.037, k:0.060, n:"Mitosis (Cell)"}, {f:0.054, k:0.062, n:"Coral (Maze)"},
    {f:0.035, k:0.060, n:"Bacteria"}, {f:0.018, k:0.051, n:"Spirals"}, {f:0.054, k:0.061, n:"Fingerprint"}
];

const cP=[
    {p:"#00ffff",b:"#1a1a2e",n:"Cool"},{p:"#ff00ff",b:"#220022",n:"Neon"},
    {p:"#d4af37",b:"#111111",n:"Chic"},{p:"#ccff00",b:"#330066",n:"Psyche"},
    {p:"#ffffff",b:"#002200",n:"Forest"},{p:"#ff4400",b:"#221100",n:"Magma"}
];

const hnt=(t)=>{const h=document.getElementById('hint');h.innerText=t;h.style.opacity=1;setTimeout(()=>h.style.opacity=0,1200)};
const getI=(x,y)=>((x+W)%W)+((y+H)%H)*W;
const hex=(h)=>h.match(/[A-Za-z0-9]{2}/g).map(v=>parseInt(v,16));

function tglR(){run=!run;document.getElementById('p-btn').innerText=run?"⏸️":"▶️";hnt(run?"Start Simulation":"Pause Simulation")}
function clr(){gA.fill(1);gB.fill(0);drw();hnt("Clear Canvas")}

function cycS(){
    sI = (sI + 1) % shapes.length;
    document.getElementById('s-btn').innerText = sIcons[sI];
    mU(); hnt("Shape: " + shapes[sI]);
}

function cycRD(){
    rdI = (rdI + 1) % rdPresets.length;
    const pre = rdPresets[rdI];
    document.getElementById('f').value = pre.f;
    document.getElementById('k').value = pre.k;
    hnt("Preset: " + pre.n);
}

function cycC(){
    cI = (cI + 1) % cP.length;
    document.getElementById('pc').value = cP[cI].p;
    document.getElementById('bc').value = cP[cI].b;
    hnt("Style: " + cP[cI].n);
}

function tglG(){
    p.glow=!p.glow; 
    document.getElementById('g-btn').classList.toggle('active', p.glow);
    hnt("Glow Effect: "+(p.glow?"ON":"OFF"));
}

function rstP(id, val){ document.getElementById(id).value = val; hnt("Reset "+id); }

function sv(){
    const l=document.createElement('a');
    l.download=`RD_Capture_${Date.now()}.png`;
    l.href=cvs.toDataURL('image/png');
    l.click();
    hnt("📸 Photo Saved to Device");
}

function mU(){
    const mc=document.createElement('canvas');mc.width=W;mc.height=H;const mctx=mc.getContext('2d');
    mctx.fillStyle="#000"; mctx.fillRect(0,0,W,H);
    mctx.strokeStyle="#fff"; mctx.fillStyle="#fff";
    
    // High-quality Fade & AA mask
    mctx.filter = "blur(1.8px)";
    const curS = shapes[sI];
    mctx.lineWidth = 4;

    if(curS==='circle'){
        mctx.beginPath(); mctx.arc(W/2,H/2,W/2.1,0,Math.PI*2); mctx.fill();
    } else if(curS==='square'){
        mctx.fillRect(10,10,W-20,H-20);
    } else if(curS==='metaball'){
        // Lighter Metaball Outline Generation
        mctx.lineWidth = 3;
        for(let i=0; i<6; i++){
            const x = 30+Math.random()*(W-60), y = 30+Math.random()*(H-60), r = 20+Math.random()*25;
            mctx.beginPath(); mctx.arc(x,y,r,0,Math.PI*2); mctx.stroke();
        }
    }
    const d=mctx.getImageData(0,0,W,H).data;
    for(let i=0; i<W*H; i++) mask[i]=d[i*4]/255;
    gA.fill(1); gB.fill(0);
    drw();
}

const ipt=(e)=>{
    const r=cvs.getBoundingClientRect();
    const cx=(e.clientX || (e.touches && e.touches[0].clientX));
    const cy=(e.clientY || (e.touches && e.touches[0].clientY));
    if(cx === undefined) return;
    const mx=Math.floor((cx-r.left)/r.width*W), my=Math.floor((cy-r.top)/r.height*H);
    for(let y=-4;y<=4;y++)for(let x=-4;x<=4;x++){
        const dist = Math.sqrt(x*x+y*y);
        if(dist<4.5){
            const i=getI(mx+x,my+y);
            if(mask[i]>0.1) gB[i]=Math.max(gB[i], 0.9 * (1 - dist/4.5));
        }
    }
    if(!run) drw();
};
cvs.addEventListener('pointerdown',ipt);
cvs.addEventListener('pointermove',e=>{if(e.buttons>0||e.pointerType==='touch')ipt(e)});

function stp(){
    const f=p.f,k=p.k,da=p.sc,db=p.sc*0.5;
    for(let i=0; i<W*H; i++){
        const m=mask[i]; if(m<0.01){nA[i]=1;nB[i]=0;continue}
        const x=i%W,y=(i/W)|0,a=gA[i],b=gB[i],abb=a*b*b;
        const lA=gA[getI(x-1,y)]*0.2+gA[getI(x+1,y)]*0.2+gA[getI(x,y-1)]*0.2+gA[getI(x,y+1)]*0.2+gA[getI(x-1,y-1)]*0.05+gA[getI(x+1,y-1)]*0.05+gA[getI(x-1,y+1)]*0.05+gA[getI(x+1,y+1)]*0.05-a;
        const lB=gB[getI(x-1,y)]*0.2+gB[getI(x+1,y)]*0.2+gB[getI(x,y-1)]*0.2+gB[getI(x,y+1)]*0.2+gB[getI(x-1,y-1)]*0.05+gB[getI(x+1,y-1)]*0.05+gB[getI(x-1,y+1)]*0.05+gB[getI(x+1,y+1)]*0.05-b;
        nA[i]=Math.max(0,Math.min(1,a+(da*lA-abb+f*(1-a))*m));
        nB[i]=Math.max(0,Math.min(1,b+(db*lB+abb-(k+f)*b)*m));
    }
    gA.set(nA);gB.set(nB);
}

function drw(){
    const d=ctx.createImageData(W,H),pR=p.pRGB[0],pG=p.pRGB[1],pB=p.pRGB[2],bR=p.bRGB[0],bG=p.bRGB[1],bB=p.bRGB[2];
    for(let i=0;i<W*H;i++){
        const px=i*4,m=mask[i],v=Math.max(0,1-(gA[i]-gB[i])),bV=gB[i],gl=p.glow?bV*1.9:0;
        let r=pR*v+bR*(1-v)+gl*100,g=pG*v+bG*(1-v)+gl*100,b=pB*v+bB*(1-v)+gl*100;
        const edge = (m > 0 && m < 0.98) ? 14 : 0;
        d.data[px]=(r+edge)*m+bR*(1-m)+edge; 
        d.data[px+1]=(g+edge)*m+bG*(1-m)+edge; 
        d.data[px+2]=(b+edge)*m+bB*(1-m)+edge; 
        d.data[px+3]=255;
    }
    ctx.putImageData(d,0,0);
}

function lp(){
    p.f=parseFloat(document.getElementById('f').value); p.k=parseFloat(document.getElementById('k').value);
    p.sc=parseFloat(document.getElementById('sc').value); p.sp=parseInt(document.getElementById('sp').value);
    p.pRGB=hex(document.getElementById('pc').value); p.bRGB=hex(document.getElementById('bc').value);
    document.getElementById('v-f').innerText=p.f.toFixed(3); document.getElementById('v-k').innerText=p.k.toFixed(3);
    document.getElementById('v-sc').innerText=p.sc.toFixed(2); document.getElementById('v-sp').innerText=p.sp;
    if(run){for(let i=0;i<p.sp;i++)stp();drw();} else { drw(); }
    requestAnimationFrame(lp);
}

document.getElementById('g-btn').classList.add('active');
mU(); lp();
</script>
</body>
</html>
