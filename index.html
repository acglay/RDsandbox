<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>RD Sandbox v1.3</title>
    <style>
        :root { --bg: #000; --ui: #1a1a1a; --acc: #00d4ff; }
        body { margin: 0; background: var(--bg); color: #eee; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #canvas-wrap { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        canvas { width: min(100vw, 100%); height: min(100vh, 100%); aspect-ratio: 1/1; touch-action: none; image-rendering: auto; }
        #hud { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .hud-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #444; background: rgba(30,30,30,0.8); color: #fff; font-size: 24px; backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; }
        #hint { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.3s; pointer-events: none; border: 1px solid var(--acc); z-index: 20; }
        #ui { background: var(--ui); height: 200px; border-top: 1px solid #333; z-index: 100; }
        .tabs { display: flex; background: #000; height: 40px; }
        .tab-btn { flex: 1; border: none; background: transparent; color: #666; font-size: 18px; }
        .tab-btn.active { color: var(--acc); background: var(--ui); box-shadow: inset 0 2px var(--acc); }
        .tab-content { display: none; padding: 12px 20px; height: 160px; box-sizing: border-box; }
        .tab-content.active { display: block; }
        .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 10px; }
        .row label { width: 80px; overflow: hidden; white-space: nowrap; }
        input[type="range"] { flex: 1; accent-color: var(--acc); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn { background: #333; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; font-size: 20px; }
        .v { position: absolute; top: 5px; left: 8px; font-size: 9px; color: #444; }
    </style>
</head>
<body>
    <div id="canvas-wrap">
        <div class="v">v1.3-pro</div><div id="hint"></div>
        <canvas id="cvs"></canvas>
        <div id="hud">
            <button class="hud-btn" id="p-btn" onclick="tglR()">▶️</button>
            <button class="hud-btn" onclick="clr()">🔄</button>
            <button class="hud-btn" onclick="sv()">📸</button>
        </div>
    </div>
    <div id="ui">
        <div class="tabs">
            <button class="tab-btn active" onclick="tb(0)">💠</button>
            <button class="tab-btn" onclick="tb(1)">🧪</button>
            <button class="tab-btn" onclick="tb(2)">🌈</button>
            <button class="tab-btn" onclick="tb(3)">🎨</button>
        </div>
        <div id="t0" class="tab-content active">
            <div class="grid">
                <button class="btn" onclick="sh('circle')">⭕</button><button class="btn" onclick="sh('square')">⬜</button>
                <button class="btn" onclick="sh('horse')">🐎</button><button class="btn" onclick="sh('metaball')">🎲</button>
            </div>
            <p style="text-align:center;color:#666;font-size:10px;margin-top:20px">タップして「種」を撒いてください</p>
        </div>
        <div id="t1" class="tab-content">
            <div class="row"><label>Speed (<span id="v-sp"></span>)</label><input type="range" id="sp" min="1" max="25" value="8"></div>
            <div class="row"><label>Scale (<span id="v-sc"></span>)</label><input type="range" id="sc" min="0.1" max="1.5" step="0.1" value="1.0"></div>
            <div class="row"><label>Feed (<span id="v-f"></span>)</label><input type="range" id="f" min="0.01" max="0.1" step="0.001" value="0.037"></div>
            <div class="row"><label>Kill (<span id="v-k"></span>)</label><input type="range" id="k" min="0.01" max="0.1" step="0.001" value="0.060"></div>
        </div>
        <div id="t2" class="tab-content">
            <div class="grid">
                <button class="btn" onclick="cyc()">🌈</button><button class="btn" onclick="tglG()">✨</button>
                <button class="btn" onclick="tglV()">🌍</button><button class="btn" onclick="rst()">♻️</button>
            </div>
            <p style="text-align:center;color:#666;font-size:10px;margin-top:10px">🌈: プリセット切替 / ✨: 発光 / 🌍: 重力</p>
        </div>
        <div id="t3" class="tab-content">
            <div class="row"><label>Pattern</label><input type="color" id="pc" value="#00ffff" style="flex:1;height:35px"></div>
            <div class="row"><label>Background</label><input type="color" id="bc" value="#1a1a2e" style="flex:1;height:35px"></div>
        </div>
    </div>
<script>
const W=200,H=200,cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d',{alpha:false});
cvs.width=W; cvs.height=H;
let gA=new Float32Array(W*H).fill(1), gB=new Float32Array(W*H).fill(0), nA=new Float32Array(W*H), nB=new Float32Array(W*H), mask=new Float32Array(W*H).fill(1);
let run=false, cI=0, curS='circle';
const p={f:0.037, k:0.060, sp:8, glow:true, sc:1.0, gx:0, gy:0, gOn:false, pRGB:[0,255,255], bRGB:[26,26,46]};
const cP=[{p:"#00ffff",b:"#1a1a2e",n:"Cool"},{p:"#ff00ff",b:"#220022",n:"Neon"},{p:"#d4af37",b:"#111111",n:"Chic"},{p:"#ccff00",b:"#330066",n:"Psyche"},{p:"#ffffff",b:"#002200",n:"Forest"},{p:"#ff4400",b:"#221100",n:"Magma"}];
const hnt=(t)=>{const h=document.getElementById('hint');h.innerText=t;h.style.opacity=1;setTimeout(()=>h.style.opacity=0,1000)};
const getI=(x,y)=>((x+W)%W)+((y+H)%H)*W;
const hex=(h)=>h.match(/[A-Za-z0-9]{2}/g).map(v=>parseInt(v,16));
function tb(n){document.querySelectorAll('.tab-btn, .tab-content').forEach((el,i)=>el.classList.toggle('active',(i%4)===n));hnt(["Shape","Physics","Presets","Colors"][n])}
function tglR(){run=!run;document.getElementById('p-btn').innerText=run?"⏸️":"▶️";hnt(run?"Start":"Pause")}
function clr(){gA.fill(1);gB.fill(0);drw();hnt("Clear")}
function sh(s){curS=s;mU();hnt("Shape: "+s)}
function cyc(){cI=(cI+1)%cP.length;document.getElementById('pc').value=cP[cI].p;document.getElementById('bc').value=cP[cI].b;hnt(cP[cI].n)}
function tglG(){p.glow=!p.glow;hnt("Glow: "+(p.glow?"ON":"OFF"))}
function tglV(){p.gOn=!p.gOn;hnt("Gravity: "+(p.gOn?"ON":"OFF"))}
function rst(){document.getElementById('f').value=0.037;document.getElementById('k').value=0.060;document.getElementById('sc').value=1.0;hnt("Reset")}
function mU(){
    const mc=document.createElement('canvas');mc.width=W;mc.height=H;const mctx=mc.getContext('2d');
    mctx.fillStyle="#000";mctx.fillRect(0,0,W,H);mctx.fillStyle="#fff";
    mctx.filter = "blur(1px)";
    if(curS==='circle'){mctx.beginPath();mctx.arc(W/2,H/2,W/2.5,0,Math.PI*2);mctx.fill()}
    else if(curS==='square'){mctx.fillRect(35,35,W-70,H-70)}
    else if(curS==='horse'){mctx.font="bold 130px sans-serif";mctx.textAlign="center";mctx.textBaseline="middle";mctx.fillText('🐎',W/2,H/2+10)}
    else if(curS==='metaball'){
        const bs=Array.from({length:5},()=>({x:40+Math.random()*(W-80),y:40+Math.random()*(H-80),r:20+Math.random()*25}));
        for(let y=0;y<H;y++)for(let x=0;x<W;x++){let v=0;bs.forEach(b=>v+=(b.r*b.r)/(Math.pow(x-b.x,2)+Math.pow(y-b.y,2)));if(v>1)mctx.fillRect(x,y,1,1)}
    }
    const d=mctx.getImageData(0,0,W,H).data;for(let i=0;i<W*H;i++)mask[i]=d[i*4]/255;gA.fill(1);gB.fill(0);drw();
}
const ipt=(e)=>{
    const r=cvs.getBoundingClientRect(),cx=e.clientX||(e.touches?e.touches[0].clientX:0),cy=e.clientY||(e.touches?e.touches[0].clientY:0);
    const mx=Math.floor((cx-r.left)/r.width*W),my=Math.floor((cy-r.top)/r.height*H);
    for(let y=-4;y<=4;y++)for(let x=-4;x<=4;x++){if(Math.sqrt(x*x+y*y)<4){const i=getI(mx+x,my+y);if(mask[i]>0.1)gB[i]=0.8}}
    if(!run)drw();
};
cvs.addEventListener('pointerdown',ipt);cvs.addEventListener('pointermove',e=>{if(e.buttons>0||e.touches)ipt(e)});
window.addEventListener('deviceorientation',e=>{if(p.gOn){p.gx=Math.min(1.5,Math.max(-1.5,e.gamma/20));p.gy=Math.min(1.5,Math.max(-1.5,e.beta/20))}});
function stp(){
    const f=p.f,k=p.k,da=p.sc,db=p.sc*0.5,gx=Math.round(p.gx),gy=Math.round(p.gy);
    for(let i=0;i<W*H;i++){
        if(mask[i]<0.01){nA[i]=1;nB[i]=0;continue}
        const x=i%W,y=(i/W)|0,a=gA[i],b=gB[i],abb=a*b*b;
        const lA=(gA[getI(x-1,y)]*0.2+gA[getI(x+1,y)]*0.2+gA[getI(x,y-1)]*0.2+gA[getI(x,y+1)]*0.2+gA[getI(x-1,y-1)]*0.05+gA[getI(x+1,y-1)]*0.05+gA[getI(x-1,y+1)]*0.05+gA[getI(x+1,y+1)]*0.05-a)+(gA[getI(x-gx,y-gy)]-a)*0.1;
        const lB=(gB[getI(x-1,y)]*0.2+gB[getI(x+1,y)]*0.2+gB[getI(x,y-1)]*0.2+gB[getI(x,y+1)]*0.2+gB[getI(x-1,y-1)]*0.05+gB[getI(x+1,y-1)]*0.05+gB[getI(x-1,y+1)]*0.05+gB[getI(x+1,y+1)]*0.05-b)+(gB[getI(x-gx,y-gy)]-b)*0.1;
        nA[i]=Math.max(0,Math.min(1,a+(da*lA-abb+f*(1-a))*mask[i]));nB[i]=Math.max(0,Math.min(1,b+(db*lB+abb-(k+f)*b)*mask[i]));
    }
    gA.set(nA);gB.set(nB);
}
function drw(){
    const d=ctx.createImageData(W,H),pR=p.pRGB[0],pG=p.pRGB[1],pB=p.pRGB[2],bR=p.bRGB[0],bG=p.bRGB[1],bB=p.bRGB[2];
    for(let i=0;i<W*H;i++){
        const px=i*4,m=mask[i],v=Math.max(0,1-(gA[i]-gB[i])),bV=gB[i],gl=p.glow?bV*1.5:0;
        let r=pR*v+bR*(1-v)+gl*100,g=pG*v+bG*(1-v)+gl*100,b=pB*v+bB*(1-v)+gl*100;
        // Draw subtle outline
        const edge = (m > 0 && m < 0.9) ? 20 : 0;
        d.data[px]=(r+edge)*m+bR*(1-m)+edge;
        d.data[px+1]=(g+edge)*m+bG*(1-m)+edge;
        d.data[px+2]=(b+edge)*m+bB*(1-m)+edge;
        d.data[px+3]=255;
    }
    ctx.putImageData(d,0,0);
}
function sv(){const l=document.createElement('a');l.download=`RD_${Date.now()}.png`;l.href=cvs.toDataURL();l.click()}
function lp(){
    p.f=parseFloat(document.getElementById('f').value);p.k=parseFloat(document.getElementById('k').value);
    p.sc=parseFloat(document.getElementById('sc').value);p.sp=parseInt(document.getElementById('sp').value);
    p.pRGB=hex(document.getElementById('pc').value);p.bRGB=hex(document.getElementById('bc').value);
    document.getElementById('v-f').innerText=p.f.toFixed(3);document.getElementById('v-k').innerText=p.k.toFixed(3);
    document.getElementById('v-sc').innerText=p.sc.toFixed(1);document.getElementById('v-sp').innerText=p.sp;
    if(run){for(let i=0;i<p.sp;i++)stp();drw()} else { drw(); }
    requestAnimationFrame(lp);
}
mU();lp();
</script>
</body>
</html>
